services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      MONGODB_URI: ${MONGODB_URI}
      PORT: 4000
      CHECK_INTERVAL_MS: ${CHECK_INTERVAL_MS:-60000}
      FRONTEND_URL: http://localhost:3000

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
